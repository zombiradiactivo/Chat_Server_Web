name = "chat-server"
version = "1.0.0"
description = "Servidor/Cliente Web de mensajería avanzada estilo Discord"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "sqlalchemy>=2.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "python-multipart>=0.0.6",
    "aiofiles>=23.0.0",
    "websockets>=12.0",
    "numpy>=1.24.0",
    "opencv-python>=4.8.0",
    "av>=12.0.0",
    "pyaudio>=0.2.14",
    "pillow>=10.0.0",
    "httpx>=0.25.0",
    "cryptography>=41.0.0",
]

[tool.uvicorn]
host = "0.0.0.0"
port = 8000
reload = true

[tool.pyright]
pythonVersion = "3.10"